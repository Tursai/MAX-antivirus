name: Build MAX EXE on: [push, workflow_dispatch] jobs: build: runs-on: windows-latest steps: - uses: actions/checkout@v4 - name: Setup MSVC uses: ilammy/msvc-dev-cmd@v1 - name: Build EXE run: | cmake -B build -S . -DCMAKE_BUILD_TYPE=Release cmake --build build --config Release --target MAX - name: Get EXE uses: actions/upload-artifact@v4 with: name: My-MAX-Antivirus path: build/bin/Release/MAX.exe
