name: Build MAX Antivirus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DENABLE_EXAMPLES=OFF `
          -DENABLE_APP=OFF `
          -DCMAKE_BUILD_TYPE=Release

    - name: Build MAX
      run: |
        cmake --build build --config Release --target MAX
        cmake --build build --config Release --target MAX_Guard

    - name: Create Installer (MSI)
      working-directory: build
      run: cpack -G WIX -C Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MAX-Antivirus-Setup
        path: |
          build/*.msi
          build/Release/MAX.exe
          ui_mockup.html
