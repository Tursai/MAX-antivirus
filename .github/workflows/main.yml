name: Build MAX Antivirus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022 # Явно указываем версию сервера

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1 # Настраивает переменные окружения Visual Studio

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DENABLE_EXAMPLES=ON `
          -DENABLE_APP=ON `
          -DCMAKE_BUILD_TYPE=Release `
          -DCPACK_PACKAGE_NAME="MAX Antivirus"

    - name: Build MAX
      run: |
        cmake --build build --config Release --target MAX
        cmake --build build --config Release --target MAX_Guard

    - name: Create Installer (MSI)
      working-directory: build
      run: cpack -G WIX

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MAX-Antivirus-Setup
        path: |
          build/*.msi
          build/bin/Release/MAX.exe
          ui_mockup.html
