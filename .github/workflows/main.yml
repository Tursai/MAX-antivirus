name: Build MAX Antivirus
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target MAX
      - name: Create Installer
        run: |
          mkdir release_pkg
          cp build/Release/MAX.exe release_pkg/
          cp ui_mockup.html release_pkg/
          # Эта команда создает сам файл установки .msi
          cpack --config build/CPackConfig.cmake -G WIX
      - name: Get Files
        uses: actions/upload-artifact@v4
        with:
          name: MAX_Antivirus_INSTALLER
          path: |
            build/*.msi
            release_pkg/*
