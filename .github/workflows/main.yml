name: Build MAX Antivirus
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target MAX
      - name: Prepare Folder
        run: |
          mkdir MAX_Antivirus
          cp build/Release/MAX.exe MAX_Antivirus/
          cp ui_mockup.html MAX_Antivirus/
          cp mascot.png MAX_Antivirus/ || echo "No mascot yet"
      - name: Download Link
        uses: actions/upload-artifact@v4
        with:
          name: MAX_Antivirus_READY
          path: MAX_Antivirus/*
