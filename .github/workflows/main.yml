name: Build MAX Antivirus
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target MAX
      - name: Create Package
        run: |
          mkdir release_dist
          cp build/Release/MAX.exe release_dist/
          cp build/_deps/webview2-src/build/native/x64/WebView2Loader.dll release_dist/
          cp ui_mockup.html release_dist/
      - name: Download MAX
        uses: actions/upload-artifact@v4
        with:
          name: MAX-Antivirus-Standalone
          path: release_dist/*
