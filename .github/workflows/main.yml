name: Build MAX Antivirus
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target MAX
      - name: Bundle
        run: |
          mkdir dist
          cp build/Release/MAX.exe dist/
          cp build/_deps/webview2-src/build/native/x64/WebView2Loader.dll dist/
          cp ui_mockup.html dist/
          cp mascot.png dist/ || echo "No mascot"
      - name: Download
        uses: actions/upload-artifact@v4
        with:
          name: MAX-Antivirus-Final
          path: dist/*
