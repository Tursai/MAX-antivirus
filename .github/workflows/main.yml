name: Build MAX
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build -S .
          cmake --build build --config Release --target MAX
      - name: Get EXE
        uses: actions/upload-artifact@v4
        with:
          name: MAX_Result
          path: build/Release/MAX.exe
