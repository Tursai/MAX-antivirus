# Оптимизированная конфигурация для максимальной защиты
LogFile /var/log/clamav/clamd.log
PidFile /run/clamav/clamd.pid
DatabaseDirectory /var/lib/clamav
LocalSocket /run/clamav/clamd.ctl

# Максимальная глубина сканирования
MaxScanSize 200M
MaxFileSize 100M
MaxRecursion 30
MaxFiles 50000

# Включаем все виды анализа
ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanPDF yes
ScanHTML yes
ScanArchive yes
ScanSWF yes
ScanXMLDOCS yes
ScanHWP3 yes

# Эвристика и дополнительные проверки
HeuristicScanPrecedence yes
StructuredDataDetection yes
ArchiveBlockEncrypted no
OLE2BlockMacros no
PhishingSignatures yes
PhishingScanURLs yes

# Алгоритмическое обнаружение и байткод
AlgorithmicDetection yes
Bytecode yes
BytecodeSecurity Paranoid

# Проверка PUA (Possibly Unwanted Applications)
DetectPUA yes
ExcludePUA NetTool
ExcludePUA PWTool

# Потоки (зависит от количества ядер CPU)
MaxThreads 12
ReadTimeout 300
CommandReadTimeout 30
SendTimeout 300
