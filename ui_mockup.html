<script>
    function startScan() {
        const btn = document.querySelector('.btn-main');
        btn.innerText = "АНАЛИЗ СИСТЕМЫ...";
        btn.style.background = "#ef4444"; // Кнопка краснеет при работе
        
        // ОТПРАВЛЯЕМ СИГНАЛ В C++
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage("start_scan");
        }
    }

    // ЖДЕМ ОТВЕТ ОТ C++ (когда сканирование "закончится")
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.addEventListener('message', event => {
            if (event.data === "scan_completed") {
                alert("Робот MAX: Угроз не обнаружено. Ваш компьютер в полной безопасности!");
                const btn = document.querySelector('.btn-main');
                btn.innerText = "ЗАПУСТИТЬ ПРОВЕРКУ";
                btn.style.background = "#3b82f6";
            }
        });
    }
</script>
